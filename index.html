  <body>
    <div id="root">
      <div id="initial-loader" style="position:fixed;inset:0;background:#0d2818;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:system-ui,-apple-system,sans-serif">
        <div style="width:120px;height:120px;display:flex;align-items:center;justify-content:center;margin-bottom:16px">
          <img src="https://res.cloudinary.com/dzxesa3wi/image/upload/v1783162335/afiii_wqkawf.png" alt="AFI Collection" style="width:120px;height:auto;object-fit:contain" />
        </div>
        <h1 style="font-size:24px;font-weight:900;color:white;margin:0;letter-spacing:-.02em">AFI Collection</h1>
        <p style="color:rgba(255,255,255,.4);font-size:12px;margin-top:8px;font-weight:600;letter-spacing:.15em;text-transform:uppercase">Artisanat Béninois</p>
        <div style="margin-top:40px;display:flex;gap:6px">
          <span class="loader-dot"></span>
          <span class="loader-dot" style="animation-delay:.2s"></span>
          <span class="loader-dot" style="animation-delay:.4s"></span>
        </div>
        <style>
          .loader-dot{width:8px;height:8px;border-radius:50%;background:white;animation:bounce 1s ease-in-out infinite}
          @keyframes bounce{0%,100%{opacity:.2}50%{opacity:1}}
        </style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
